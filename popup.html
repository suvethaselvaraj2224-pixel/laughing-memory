<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Email Summarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d0d0f;
        --surface: #16161a;
        --surface2: #1e1e24;
        --border: #2a2a32;
        --accent: #7b6ef6;
        --accent-glow: rgba(123, 110, 246, 0.25);
        --accent2: #4fc7aa;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --success: #4fc7aa;
        --error: #f0607a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 360px;
        min-height: 200px;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        overflow: hidden;
      }

      /* Ambient glow background */
      body::before {
        content: '';
        position: fixed;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        padding: 20px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        box-shadow: 0 0 12px var(--accent-glow);
      }

      .logo-text {
        font-family: 'Syne', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--text);
      }

      .logo-text span {
        color: var(--accent);
      }

      .badge {
        font-size: 9px;
        font-weight: 400;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 2px 7px;
        border-radius: 20px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* Button */
      #summarizeBtn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--accent), #5b4fe0);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s ease;
        box-shadow: 0 4px 20px var(--accent-glow);
        position: relative;
        overflow: hidden;
      }

      #summarizeBtn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
        opacity: 0;
        transition: opacity 0.2s;
      }

      #summarizeBtn:hover::after { opacity: 1; }
      #summarizeBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
      #summarizeBtn:active { transform: translateY(0); }
      #summarizeBtn:disabled {
        background: var(--surface2);
        color: var(--muted);
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
        margin: 18px 0;
        display: none;
      }
      .divider.visible { display: block; }

      /* Output area */
      #output {
        display: none;
        animation: fadeUp 0.3s ease forwards;
      }
      #output.visible { display: block; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .output-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--muted);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .output-label::before {
        content: '';
        display: inline-block;
        width: 5px;
        height: 5px;
        background: var(--accent2);
        border-radius: 50%;
        box-shadow: 0 0 6px var(--accent2);
      }

      #summary {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        line-height: 1.7;
        color: var(--text);
        font-size: 12.5px;
        white-space: pre-wrap;
        max-height: 280px;
        overflow-y: auto;
      }

      #summary::-webkit-scrollbar { width: 4px; }
      #summary::-webkit-scrollbar-track { background: transparent; }
      #summary::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* Error state */
      .error-msg {
        background: rgba(240, 96, 122, 0.08);
        border: 1px solid rgba(240, 96, 122, 0.25);
        border-radius: 10px;
        padding: 12px 14px;
        color: var(--error);
        font-size: 12px;
        line-height: 1.5;
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .error-msg::before { content: '⚠'; flex-shrink: 0; }

      /* Copy button */
      #copyBtn {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        display: none;
      }
      #copyBtn:hover { border-color: var(--accent); color: var(--accent); }
      #copyBtn.visible { display: block; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <div class="logo-icon">✦</div>
          <div class="logo-text">mail<span>brief</span></div>
        </div>
        <div class="badge">Gmail AI</div>
      </div>

      <button id="summarizeBtn">
        <span>✦</span> Summarize Email
      </button>

      <div class="divider" id="divider"></div>

      <div id="output">
        <div class="output-label">Summary</div>
        <div id="summary"></div>
        <button id="copyBtn">Copy to clipboard</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
